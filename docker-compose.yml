# ═══════════════════════════════════════════════════════════════════════════
# MINE — Local Development Stack
#
# Quick start:
#   1. cd backend && cp .env.template .env
#   2. fill in your dev keys (or leave blank — Stripe/SendGrid features
#      will be disabled, but the app will still run)
#   3. cd .. && docker compose up
#
# Then visit:
#   http://localhost:8080/mine-live-dashboard.html
#   http://localhost:8080/agency-live-dashboard.html
#   http://localhost:8080/admin-live-dashboard.html
#   http://localhost:3001/api/features/health    (backend health)
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─── Postgres database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mine
      POSTGRES_PASSWORD: mine_dev
      POSTGRES_DB: mine_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mine -d mine_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ─── Backend API ────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      # Override whatever's in .env for local dev
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://mine:mine_dev@postgres:5432/mine_dev
      FRONTEND_URL: http://localhost:8080
      BACKEND_URL: http://localhost:3001
      # Dev-only secrets — override with real values in .env for production
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-minimum-32-chars-long-change-in-prod}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-in-prod}
      CRON_SECRET: ${CRON_SECRET:-dev-cron-secret-change-in-prod}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
    volumes:
      - mine-uploads:/app/uploads
      # Uncomment for live-reload during dev (mount source code)
      # - ./backend:/app
      # - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/features/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ─── Frontend (static HTML) ─────────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./live:/usr/share/nginx/html:ro
      - ./landing-pages:/usr/share/nginx/html/landing:ro
      - ./samples:/usr/share/nginx/html/samples:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  mine-uploads:
