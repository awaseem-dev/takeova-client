<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#4F46E5">
  <title>MINE</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      background: #4F46E5;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }
    #boot {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #4F46E5; color: #fff;
    }
    .logo { font-size: 36px; font-weight: 800; letter-spacing: -0.5px; }
    .tag  { font-size: 13px; opacity: .8; margin-top: 6px; }
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; margin-top: 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="boot">
    <div class="logo">MINE</div>
    <div class="tag">Loading your business…</div>
    <div class="spinner"></div>
  </div>
  <!--
    This page is only shown for ~1 second during native cold-boot.
    Capacitor immediately redirects the WebView to the URL configured in
    capacitor.config.ts (server.url = https://app.mine.app by default).

    All MINE features — dashboards, AI Employees, integrations, Quick Pay,
    invoices, contacts, sites — load from the deployed MINE backend.
  -->
  <script src="main.js"></script>
</body>
</html>
