services:
  - type: web
    name: mine-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/features/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OAUTH_STATE_SECRET
        generateValue: true
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: CREDENTIAL_VAULT_KEY
        generateValue: true
      - key: CREDENTIAL_VAULT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
