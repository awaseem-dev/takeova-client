events { worker_connections 1024; }
http {
  upstream mine { server backend:4000; }
  server {
    listen 80;
    server_name mine.app *.mine.app;
    return 301 https://$host$request_uri;
  }
  server {
    listen 443 ssl http2;
    server_name mine.app *.mine.app;
    ssl_certificate /etc/letsencrypt/live/mine.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mine.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ { proxy_pass http://mine/api/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /webhook { proxy_pass http://mine/webhook; proxy_set_header Host $host; }
    location /public/ { proxy_pass http://mine/public/; proxy_set_header Host $host; }
    location /health { proxy_pass http://mine/health; }
    location /uploads/ { proxy_pass http://mine/uploads/; }
    location / { proxy_pass http://mine/; proxy_set_header Host $host; }
  }
}
