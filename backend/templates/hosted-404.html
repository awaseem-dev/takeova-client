<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found</title>
<meta name="robots" content="noindex">
<style>
  /* Neutral 404 served on hosted customer sites. Intentionally un-branded so it
     doesn't clash with the site's own look. Swap --accent / the wordmark if you
     want to theme it per site. */
  :root{--ink:#1A1A1A;--muted:#6B7280;--line:#E5E7EB;--bg:#FAFAFA;--accent:#1A1A1A}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
  main{flex:1;display:grid;place-items:center;text-align:center;padding:32px}
  .box{max-width:480px}
  .code{font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  h1{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:800;letter-spacing:-.02em;margin-bottom:14px}
  p{font-size:1.08rem;color:var(--muted);max-width:40ch;margin:0 auto 28px}
  .home{display:inline-block;background:var(--accent);color:#fff;padding:13px 28px;border-radius:9px;font-weight:600;font-size:1rem;text-decoration:none;transition:opacity .2s}
  .home:hover{opacity:.85}
  .div{width:40px;height:3px;background:var(--line);border-radius:3px;margin:0 auto 26px}
  footer{padding:22px;text-align:center}
  footer a{font-size:.82rem;color:var(--muted);text-decoration:none;opacity:.8}
  footer a:hover{opacity:1}
</style>
</head>
<body>
<main>
  <div class="box">
    <div class="code">Error 404</div>
    <h1>Page not found</h1>
    <div class="div"></div>
    <p>Sorry — the page you're looking for doesn't exist or has moved.</p>
    <a href="/" class="home">Return home</a>
  </div>
</main>
<footer><a href="https://mine.app" target="_blank" rel="noopener">Powered by MINE</a></footer>
</body>
</html>
